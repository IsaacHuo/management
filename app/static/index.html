<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>图书馆管理系统</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main id="login-view" class="login-shell">
      <section class="login-panel">
        <h1>图书馆管理系统</h1>
        <p>管理后台</p>
        <form id="login-form" class="stack">
          <label>
            用户名
            <input name="username" value="admin" autocomplete="username" required>
          </label>
          <label>
            密码
            <input name="password" type="password" value="Admin@123456" autocomplete="current-password" required>
          </label>
          <button type="submit">登录</button>
          <div id="login-error" class="message error" hidden></div>
        </form>
      </section>
    </main>

    <main id="app-view" class="app-shell" hidden>
      <aside class="sidebar">
        <div class="brand">
          <strong>图书馆管理</strong>
          <span id="admin-name">管理员</span>
        </div>
        <nav>
          <button class="nav-button active" data-view="dashboard">仪表盘</button>
          <button class="nav-button" data-view="books">图书管理</button>
          <button class="nav-button" data-view="readers">读者管理</button>
          <button class="nav-button" data-view="loans">借阅归还</button>
          <button class="nav-button" data-view="overdue">逾期记录</button>
        </nav>
        <button id="logout-button" class="secondary">退出登录</button>
      </aside>

      <section class="content">
        <header class="topbar">
          <div>
            <h2 id="view-title">仪表盘</h2>
            <p id="view-subtitle">系统运行概览</p>
          </div>
          <button id="refresh-button" class="secondary">刷新</button>
        </header>

        <div id="toast" class="message" hidden></div>

        <section id="dashboard-section" class="view-section">
          <div id="stats-grid" class="stats-grid"></div>
        </section>

        <section id="books-section" class="view-section" hidden>
          <form id="book-form" class="form-grid">
            <input name="id" type="hidden">
            <label>ISBN<input name="isbn" required></label>
            <label>书名<input name="title" required></label>
            <label>作者<input name="author" required></label>
            <label>出版社<input name="publisher"></label>
            <label>分类<input name="category"></label>
            <label>出版年份<input name="published_year" type="number" min="0" max="2100"></label>
            <label>馆藏数量<input name="total_count" type="number" min="0" value="1" required></label>
            <label>可借数量<input name="available_count" type="number" min="0" value="1"></label>
            <label>位置<input name="location"></label>
            <label>状态
              <select name="status">
                <option value="active">active</option>
                <option value="inactive">inactive</option>
              </select>
            </label>
            <div class="form-actions">
              <button type="submit">保存图书</button>
              <button type="button" class="secondary" id="book-reset">清空</button>
            </div>
          </form>
          <div class="toolbar">
            <input id="book-search" placeholder="搜索 ISBN、书名、作者或分类">
            <button id="book-search-button" class="secondary">搜索</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>ISBN</th>
                  <th>书名</th>
                  <th>作者</th>
                  <th>分类</th>
                  <th>库存</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="books-body"></tbody>
            </table>
          </div>
        </section>

        <section id="readers-section" class="view-section" hidden>
          <form id="reader-form" class="form-grid">
            <input name="id" type="hidden">
            <label>借书证号<input name="card_no" required></label>
            <label>姓名<input name="name" required></label>
            <label>电话<input name="phone"></label>
            <label>邮箱<input name="email" type="email"></label>
            <label>单位/班级<input name="department"></label>
            <label>状态
              <select name="status">
                <option value="active">active</option>
                <option value="suspended">suspended</option>
              </select>
            </label>
            <div class="form-actions">
              <button type="submit">保存读者</button>
              <button type="button" class="secondary" id="reader-reset">清空</button>
            </div>
          </form>
          <div class="toolbar">
            <input id="reader-search" placeholder="搜索借书证号、姓名、电话或单位">
            <button id="reader-search-button" class="secondary">搜索</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>借书证号</th>
                  <th>姓名</th>
                  <th>电话</th>
                  <th>单位/班级</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="readers-body"></tbody>
            </table>
          </div>
        </section>

        <section id="loans-section" class="view-section" hidden>
          <form id="loan-form" class="form-grid">
            <label>读者<select name="reader_id" required></select></label>
            <label>图书<select name="book_id" required></select></label>
            <label>借阅天数<input name="days" type="number" min="1" max="365" value="30" required></label>
            <label>备注<input name="note"></label>
            <div class="form-actions">
              <button type="submit">登记借书</button>
            </div>
          </form>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>图书</th>
                  <th>读者</th>
                  <th>借出</th>
                  <th>到期</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="loans-body"></tbody>
            </table>
          </div>
        </section>

        <section id="overdue-section" class="view-section" hidden>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>图书</th>
                  <th>读者</th>
                  <th>借出</th>
                  <th>到期</th>
                  <th>备注</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="overdue-body"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
